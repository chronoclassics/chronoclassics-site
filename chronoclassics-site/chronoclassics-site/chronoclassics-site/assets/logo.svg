<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">ChronoClassics timepieces</title>
  <defs>
    <linearGradient id="bgBrush" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8d8dc"/>
      <stop offset="50%" stop-color="#c4c4ca"/>
      <stop offset="100%" stop-color="#aeaeb6"/>
    </linearGradient>
    <pattern id="fineBrush" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#c8c8ce"/>
      <line x1="0" y1="1.5" x2="3" y2="1.5" stroke="#b8b8c0" stroke-width="0.35"/>
    </pattern>
    <radialGradient id="dialFace" cx="45%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#4a5058"/>
      <stop offset="55%" stop-color="#2a2e34"/>
      <stop offset="100%" stop-color="#121418"/>
    </radialGradient>
    <linearGradient id="bezelShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a9ea6"/>
      <stop offset="40%" stop-color="#5c6068"/>
      <stop offset="100%" stop-color="#3a3e46"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ec"/>
      <stop offset="50%" stop-color="#8a8e96"/>
      <stop offset="100%" stop-color="#4a4e56"/>
    </linearGradient>
    <filter id="phonePop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <path id="arcTop" d="M 28 118 A 92 92 0 0 1 212 118" fill="none"/>
    <path id="arcTopInner" d="M 48 118 A 72 72 0 0 1 192 118" fill="none"/>
    <path id="arcBottom" d="M 32 122 A 88 88 0 0 0 208 122" fill="none"/>
  </defs>

  <rect width="240" height="240" fill="url(#bgBrush)"/>
  <rect width="240" height="240" fill="url(#fineBrush)" opacity="0.45"/>

  <g fill="url(#bezelShine)" stroke="#2a2a30" stroke-width="0.4">
    <g transform="translate(120 120)">
      <rect id="tooth" x="-4" y="-118" width="8" height="14" rx="1"/>
      <use href="#tooth" transform="rotate(30)"/>
      <use href="#tooth" transform="rotate(60)"/>
      <use href="#tooth" transform="rotate(90)"/>
      <use href="#tooth" transform="rotate(120)"/>
      <use href="#tooth" transform="rotate(150)"/>
      <use href="#tooth" transform="rotate(180)"/>
      <use href="#tooth" transform="rotate(210)"/>
      <use href="#tooth" transform="rotate(240)"/>
      <use href="#tooth" transform="rotate(270)"/>
      <use href="#tooth" transform="rotate(300)"/>
      <use href="#tooth" transform="rotate(330)"/>
    </g>
  </g>

  <circle cx="120" cy="120" r="102" fill="none" stroke="url(#goldEdge)" stroke-width="5"/>
  <circle cx="120" cy="120" r="96" fill="none" stroke="#1a1c20" stroke-width="1" opacity="0.5"/>

  <g transform="translate(120 120)">
    <rect x="92" y="-8" width="14" height="16" rx="3" fill="url(#bezelShine)" stroke="#2a2a30" stroke-width="0.5"/>
    <circle cx="99" cy="-12" r="5" fill="url(#bezelShine)" stroke="#2a2a30" stroke-width="0.5"/>
  </g>

  <circle cx="120" cy="120" r="78" fill="url(#dialFace)" stroke="#0e0f12" stroke-width="2"/>
  <circle cx="120" cy="120" r="72" fill="none" stroke="#000" stroke-width="0.5" opacity="0.35"/>
  <circle cx="120" cy="120" r="66" fill="none" stroke="#5a6068" stroke-width="0.35" opacity="0.22"/>
  <circle cx="120" cy="120" r="54" fill="none" stroke="#5a6068" stroke-width="0.3" opacity="0.16"/>
  <circle cx="120" cy="120" r="42" fill="none" stroke="#5a6068" stroke-width="0.28" opacity="0.12"/>

  <g stroke="#7a8088" stroke-width="1.1" stroke-linecap="round" opacity="0.65">
    <g transform="translate(120 120)">
      <line x1="0" y1="-70" x2="0" y2="-60"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(30)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(60)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(90)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(120)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(150)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(180)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(210)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(240)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(270)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(300)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(330)"/>
    </g>
  </g>

  <g font-family="Georgia, Times New Roman, serif" font-size="9.5" font-weight="600" fill="#d0d4dc" text-anchor="middle">
    <text x="120" y="64">XII</text>
    <text x="149" y="72">I</text>
    <text x="171" y="93">II</text>
    <text x="180" y="120">III</text>
    <text x="171" y="148">IV</text>
    <text x="149" y="170">V</text>
    <text x="120" y="180">VI</text>
    <text x="91" y="170">VII</text>
    <text x="69" y="148">VIII</text>
    <text x="60" y="120">IX</text>
    <text x="69" y="93">X</text>
    <text x="91" y="72">XI</text>
  </g>

  <g transform="translate(120 120)" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#c8ccd8" stroke-width="3.4" transform="rotate(305)"/>
    <line x1="0" y1="0" x2="0" y2="-46" stroke="#f4f6fa" stroke-width="2" transform="rotate(60)"/>
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#98a0ac" stroke-width="0.85" transform="rotate(192)"/>
    <circle r="3.2" fill="#eef0f4" stroke="#1a1c20" stroke-width="0.45"/>
  </g>

  <circle cx="120" cy="152" r="14" fill="#1a1c22" stroke="#4a5058" stroke-width="0.85"/>
  <circle cx="120" cy="152" r="11" fill="none" stroke="#3a4048" stroke-width="0.35"/>
  <g transform="translate(120 152)">
    <line x1="0" y1="0" x2="0" y2="-7" stroke="#c8d0dc" stroke-width="1" stroke-linecap="round" transform="rotate(38)"/>
  </g>

  <text font-family="system-ui, -apple-system, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="0.12em" fill="#0a0a0c">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">CHRONOCLASSICS</textPath>
  </text>
  <text font-family="system-ui, -apple-system, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="6.4" font-weight="600" letter-spacing="0.24em" fill="#2a2c32">
    <textPath href="#arcTopInner" startOffset="50%" text-anchor="middle">TIMEPIECES</textPath>
  </text>

  <text
    font-family="system-ui, -apple-system, Segoe UI, Helvetica Neue, Arial, sans-serif"
    font-size="12.5"
    font-weight="800"
    letter-spacing="0.05em"
    fill="#ffffff"
    stroke="#0a0a0c"
    stroke-width="1.15"
    paint-order="stroke fill"
    filter="url(#phonePop)"
  >
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">917-480-1080</textPath>
  </text>
</svg>
