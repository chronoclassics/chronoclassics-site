[build]
  functions = "netlify/functions"

# Run daily at 10 AM ET (14:00 UTC) — checks eBay for new listings and emails subscribers
[functions."notify-new-listings"]
  schedule = "0 14 * * *"

[[redirects]]
  from = "https://www.chrono-classics.com/*"
  to = "https://chrono-classics.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
