[build]
  functions = "netlify/functions"

# Run daily at 10 AM ET (14:00 UTC) — checks eBay for new listings and emails subscribers
[functions."notify-new-listings"]
  schedule = "0 14 * * *"

[[redirects]]
  from = "https://www.chrono-classics.com/*"
  to = "https://chrono-classics.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Google Merchant Center product feed (generated live from eBay inventory)
[[redirects]]
  from = "/google-feed.xml"
  to = "/.netlify/functions/google-feed"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"

# Service worker must always be re-validated so updates reach users promptly
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure the web app manifest is served with the correct MIME type (nosniff is on)
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
